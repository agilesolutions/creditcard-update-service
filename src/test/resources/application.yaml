server:
  port: 8080

spring:
  application:
    name: ccm
  datasource:
    DriverClassName: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5438/shares
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: validate   # use validate when Flyway manages schema
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true
    out-of-order: false

  sql:
    init:
      mode: never   # disable schema.sql/data.sql when using Flyway


logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.flywaydb: INFO

